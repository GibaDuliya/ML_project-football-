# ===========================================================================
# Example downstream task: position classification
# ===========================================================================

data_config: "configs/data.yaml"
dev_ratio: 0.20

pretrained_checkpoint: "outputs/mpp/best_model"

model:
  embed_size: 128
  num_layers: 1
  num_heads: 2
  forward_expansion: 4
  dropout: 0.05
  use_teams_embeddings: false
  position_enc_type: "learned"  # "learned" (paper default) | "sinusoidal" (BERT-style fixed)
  freeze_encoder: true         # freeze encoder, train only head

head:
  type: "classification"
  num_classes: 25              # 25 StatsBomb positions
  hidden_dim: 128
  pool: "per_token"            # predict position for each player token

training:
  output_dir: "outputs/position_cls"
  num_train_epochs: 100
  per_device_train_batch_size: 1
  sample_batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  seed: 42
  logging_steps: 50
  eval_steps: 50
  save_steps: 200
  report_to: "tensorboard"
